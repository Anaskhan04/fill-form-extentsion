<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoForm Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="wrap">
    <h1><span>⚡</span> AutoForm Pro</h1>
    
    <!-- Setup View: First time user -->
    <div id="setupView" class="hidden">
      <p>Create your first profile to get started.</p>
      <div class="row">
        <input id="initialProfileName" placeholder="Profile name (e.g., Personal)">
        <button id="createFirstProfile">Create Profile</button>
      </div>
    </div>

    <!-- Main View: Regular use -->
    <div id="mainView" class="hidden">
      <div class="row">
        <label>Active Profile</label>
        <select id="profileSelect"></select>
      </div>

      <div class="actions">
        <button id="fillNow">Fill Now</button>
        <button id="clearFields" style="background-color: #f44336;">Clear Fields</button>
        <button id="saveProfile" class="hidden" style="background-color: #059669;">Save Changes</button>
        <button id="toggleEdit" style="background-color: #4b5563;">Edit Fields</button>
      </div>

      <div id="editContainer" class="hidden">
        <div id="form"></div>
        <div class="add-custom-field">
          <div class="row">
            <input id="newFieldKey" placeholder="Field Name" style="width: 40%">
            <input id="newFieldValue" placeholder="Value" style="width: 50%">
            <button id="addFieldBtn" title="Add Field">+</button>
          </div>
        </div>
      </div>
    </div>

    <div id="status"></div>
    <div class="footer">
      <a href="../options/options.html" target="_blank">Manage Profiles & Settings</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
<html>
