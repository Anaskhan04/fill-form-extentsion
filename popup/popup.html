<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoForm Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="wrap">
    <h1>AutoForm Pro</h1>

    <div id="onboarding" class="onboarding hidden">
      <p>Create your first profile to start autofilling forms.</p>
      <div class="row">
        <input id="newProfileName" placeholder="New profile name">
        <button id="addProfile">Add Profile</button>
      </div>
    </div>

    <div id="editor">
      <div class="row">
        <label>Active Profile</label>
        <select id="profileSelect"></select>
      </div>
      <div id="form"></div>

      <div class="add-custom-field">
        <div class="row">
          <input id="newFieldKey" placeholder="Field Name" class="field-name-input">
          <input id="newFieldValue" placeholder="Value" class="field-value-input">
          <button id="addFieldBtn" title="Add Field">+</button>
        </div>
      </div>

      <div class="actions">
        <button id="fillNow">Fill Now</button>
        <button id="clearFields" class="danger">Clear Fields</button>
        <button id="saveProfile">Save Profile</button>
      </div>

      <div class="profiles">
        <input id="newProfileNameEditor" placeholder="New profile name">
        <button id="addProfileEditor">Add Profile</button>
        <button id="deleteProfile" class="danger">Delete Profile</button>
      </div>
    </div>

    <div id="status"></div>
    <div class="footer">
      <a href="../options/options.html" target="_blank">Open Settings</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
